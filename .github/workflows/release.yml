name: Release IRIS Code

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            arch: arm64
          - os: macos-15-intel
            target: darwin-x64
            arch: x64
          - os: ubuntu-latest
            target: linux-x64
            arch: x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            arch: arm64
          - os: windows-latest
            target: windows-x64
            arch: x64
            optional: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.optional == true }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache ~/.bun
        uses: actions/cache@v4
        with:
          path: ~/.bun
          key: ${{ runner.os }}-${{ matrix.arch }}-bun-${{ hashFiles('package.json') }}-${{ hashFiles('bun.lockb', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        shell: bash
        run: |
          cd packages/opencode
          bun run script/build.ts --single
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          OPENCODE_CHANNEL: latest

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd packages/opencode/dist
          for dir in opencode-*; do
            if [ -d "$dir" ]; then
              # Rename opencode- prefix to iris-
              iris_name="${dir/opencode-/iris-}"
              if [[ "$dir" == *"linux"* ]]; then
                tar -czf "${iris_name}.tar.gz" -C "$dir/bin" .
              else
                cd "$dir/bin" && zip -r "../../${iris_name}.zip" . && cd ../..
              fi
            fi
          done

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd packages/opencode/dist
          Get-ChildItem -Directory | ForEach-Object {
            $dir = $_.Name
            # Rename opencode- prefix to iris-
            $irisName = $dir -replace '^opencode-', 'iris-'
            Compress-Archive -Path "$dir\bin\*" -DestinationPath "$irisName.zip"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-${{ matrix.target }}
          path: |
            packages/opencode/dist/*.tar.gz
            packages/opencode/dist/*.zip

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - name: Checkout elon-web-ui
        uses: actions/checkout@v4
        with:
          repository: FREELABEL/fl-elon-web-ui
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --engine-strict=false
        env:
          npm_config_engine_strict: false

      - name: Generate static Nuxt build
        run: NUXT_TELEMETRY_DISABLED=1 npx nuxt generate
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          SERVER_HOST: 0.0.0.0
          SERVER_PORT: 3000
          API_URL: https://raichu.heyiris.io
          NUXT_TARGET: static

      - name: Copy web assets to Electron
        run: npx cap copy @capacitor-community/electron

      - name: Install Electron dependencies
        run: cd electron && npm ci

      - name: Build Electron TypeScript
        run: cd electron && npm run build

      - name: Package desktop app
        run: cd electron && npm run electron:pack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release archive
        run: |
          cd electron/dist
          if [ -d "mac-arm64" ]; then
            cd mac-arm64 && zip -r ../../IRIS-app-darwin-arm64.zip IRIS.app && cd ..
          elif [ -d "mac" ]; then
            cd mac && zip -r ../../IRIS-app-darwin-${{ matrix.arch }}.zip IRIS.app && cd ..
          fi
          ls -la ../*.zip 2>/dev/null || echo "No zip created"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: IRIS-app-darwin-${{ matrix.arch }}
          path: electron/IRIS-app-darwin-*.zip
          if-no-files-found: warn

  release:
    # Gate the release ONLY on the CLI binaries (build). The desktop Electron app
    # (build-desktop) takes ~30-45 min and is optional — it uploads its assets to
    # this release asynchronously via the desktop-assets job below, so it no longer
    # blocks `iris update` from getting CLI fixes. This cuts release latency ~5x.
    needs: [build]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Verify required assets exist
        run: |
          MISSING=""
          for required in iris-darwin-arm64.zip iris-darwin-x64.zip iris-linux-x64.tar.gz iris-linux-arm64.tar.gz; do
            if [ ! -f "artifacts/$required" ]; then
              MISSING="$MISSING $required"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required release assets:$MISSING"
            exit 1
          fi
          echo "All required assets present"
          # Desktop app artifacts are optional
          for optional in IRIS-app-darwin-arm64.zip IRIS-app-darwin-x64.zip; do
            if [ -f "artifacts/$optional" ]; then
              echo "Desktop app found: $optional"
            else
              echo "::warning::Desktop app not found: $optional (optional)"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: IRIS Code v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Attach the desktop Electron app to the release AFTER it finishes building.
  # Runs independently of `release` so the slow (~30-45 min) desktop build never
  # blocks shipping CLI fixes. Optional — failures here don't fail the release.
  desktop-assets:
    needs: [build-desktop, release]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop
          pattern: IRIS-app-*
          merge-multiple: true

      - name: Upload desktop assets to release
        run: |
          shopt -s nullglob
          assets=(desktop/IRIS-app-*.zip)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::warning::No desktop assets to upload (desktop build skipped or failed)"
            exit 0
          fi
          gh release upload "${{ steps.version.outputs.tag }}" "${assets[@]}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
